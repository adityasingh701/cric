<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaav Cricket Pro</title>

<style>
body {font-family:sans-serif;background:#0f172a;color:white;padding:10px;margin:0}
h2{text-align:center;color:#38bdf8}
input,select,button{
padding:10px;margin:5px;border-radius:6px;border:none;font-size:16px
}
button{background:#38bdf8;font-weight:bold}
.box{
background:#1e293b;padding:12px;border-radius:10px;margin:10px 0
}
.player{padding:6px;background:#334155;margin:3px;border-radius:5px}
</style>
</head>

<body>

<h2>🏏 Ghosi Premier League </h2>

<!-- SETUP -->
<div id="setup" class="box">
<input id="playerInput" placeholder="Enter Player Name">
<button onclick="addPlayer()">Add Player</button>

<div id="players"></div>

<button onclick="startMatch()">Start Match</button>
</div>

<!-- MATCH -->
<div id="match" style="display:none">

<div class="box">
<h3 id="inningTitle"></h3>
<h2 id="score">0/0</h2>
<p id="overs">0.0</p>
<p id="target"></p>
</div>

<div class="box">
<label>Striker:</label>
<select id="strikerSelect" onchange="changeStriker()"></select>

<label>Bowler:</label>
<select id="bowlerSelect"></select>
</div>

<div class="box">
<button onclick="addRun(0)">0</button>
<button onclick="addRun(1)">1</button>
<button onclick="addRun(2)">2</button>
<button onclick="addRun(3)">3</button>
<button onclick="addRun(4)">4</button>
<button onclick="addRun(6)">6</button>
<button onclick="wicket()">Wicket</button>
<button onclick="undo()">Undo</button>
</div>

<div class="box">
<h3>Scorecard</h3>
<div id="scorecard"></div>
</div>

<button onclick="nextInning()">Next Innings</button>
<button onclick="reset()">Reset Match</button>

</div>

<script>

let allPlayers=[];
let teamA=[], teamB=[];
let battingTeam=[], bowlingTeam=[];
let innings=1;

let striker=null;
let runs=0,wickets=0,balls=0;

let target=null;
let totalOvers=10;

let history=[];

function addPlayer(){
let name=document.getElementById("playerInput").value;
if(!name)return;
allPlayers.push(name);
document.getElementById("playerInput").value="";
renderPlayers();
}

function renderPlayers(){
document.getElementById("players").innerHTML=
allPlayers.map(p=>`<div class="player">${p}</div>`).join("");
}

function startMatch(){
if(allPlayers.length<2){alert("Minimum 2 players chahiye");return;}

teamA=[...allPlayers];
teamB=[...allPlayers];

battingTeam=teamA.map(p=>({name:p,runs:0,balls:0}));
bowlingTeam=teamB.map(p=>({name:p,overs:0,runs:0,wkts:0}));

striker=battingTeam[0].name;

document.getElementById("setup").style.display="none";
document.getElementById("match").style.display="block";

updateUI();
}

function saveHistory(){
history.push(JSON.stringify({
runs,wickets,balls,battingTeam,bowlingTeam,striker
}));
}

function undo(){
if(history.length===0)return;

let last=JSON.parse(history.pop());
runs=last.runs;
wickets=last.wickets;
balls=last.balls;
battingTeam=last.battingTeam;
bowlingTeam=last.bowlingTeam;
striker=last.striker;

updateUI();
}

function addRun(r){
saveHistory();

runs+=r;
balls++;

let p=battingTeam.find(x=>x.name===striker);
p.runs+=r;
p.balls++;

let b=bowlingTeam[document.getElementById("bowlerSelect").value];
b.runs+=r;

if(balls%6===0) b.overs++;

checkResult();
updateUI();
save();
}

function wicket(){
saveHistory();

wickets++;
balls++;

let b=bowlingTeam[document.getElementById("bowlerSelect").value];
b.wkts++;

checkResult();
updateUI();
save();
}

function checkResult(){
if(innings===2 && target){
let ballsLeft=(totalOvers*6)-balls;
let runsNeeded=target-runs;

document.getElementById("target").innerText=
`Need ${runsNeeded} runs in ${ballsLeft} balls`;

if(runs>=target){
alert("🏆 Batting Team Won!");
}
if(balls>=totalOvers*6 && runs<target){
alert("🏆 Bowling Team Won!");
}
}
}

function nextInning(){

if(innings===1){

target=runs+1;

innings=2;
runs=0;wickets=0;balls=0;
history=[];

battingTeam=teamB.map(p=>({name:p,runs:0,balls:0}));
bowlingTeam=teamA.map(p=>({name:p,overs:0,runs:0,wkts:0}));

striker=battingTeam[0].name;

document.getElementById("target").innerText=
"Target: "+target;

updateUI();

}else{
alert("Match Finished");
}
}

function updateUI(){

document.getElementById("inningTitle").innerText=
"Innings "+innings;

document.getElementById("score").innerText=
runs+"/"+wickets;

document.getElementById("overs").innerText=
Math.floor(balls/6)+"."+(balls%6)+" Overs";

let strikerSel=document.getElementById("strikerSelect");
strikerSel.innerHTML=
battingTeam.map((p,i)=>
`<option value="${i}" ${striker===p.name?'selected':''}>${p.name}</option>`
).join("");

let bowlerSel=document.getElementById("bowlerSelect");
bowlerSel.innerHTML=
bowlingTeam.map((p,i)=>
`<option value="${i}">${p.name}</option>`
).join("");

renderScorecard();
}

function changeStriker(){
let i=document.getElementById("strikerSelect").value;
striker=battingTeam[i].name;
}

function renderScorecard(){
let html="<b>Batting:</b><br>";

battingTeam.forEach(p=>{
html+=`${p.name} - ${p.runs} (${p.balls})<br>`;
});

html+="<hr><b>Bowling:</b><br>";

bowlingTeam.forEach(p=>{
html+=`${p.name} - ${p.overs} ov, ${p.runs} runs, ${p.wkts} wkts<br>`;
});

document.getElementById("scorecard").innerHTML=html;
}

function save(){
localStorage.setItem("match",JSON.stringify({
allPlayers,teamA,teamB,battingTeam,bowlingTeam,innings,runs,wickets,balls,striker,target
}));
}

window.onload=function(){
let data=JSON.parse(localStorage.getItem("match"));
if(data){
Object.assign(window,data);
document.getElementById("setup").style.display="none";
document.getElementById("match").style.display="block";
updateUI();
}
}

function reset(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
